name: Deploy SvelteKit to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Prepare Pages URL + domain routing
        env:
          DOMAIN: diabloautodetailing.com
          FALLBACK_URL: https://jakerslam.github.io/Diablo-Auto-Detailing-Website
          GH_REPO: ${{ github.repository }}
        run: |
          set -e

          if command -v dig >/dev/null 2>&1; then
            if [ -n "$(dig +short "$DOMAIN" A || true)" ]; then
              echo "DOMAIN_ACTIVE=true" >> "$GITHUB_ENV"
              echo "PUBLIC_SITE_URL=https://$DOMAIN" >> "$GITHUB_ENV"
              echo "$DOMAIN" > static/CNAME

              curl -sS -X PATCH \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                "https://api.github.com/repos/$GH_REPO/pages" \
                -d "{\"cname\":\"$DOMAIN\"}" > /tmp/pages-domain-apply.json
            else
              echo "DOMAIN_ACTIVE=false" >> "$GITHUB_ENV"
              echo "PUBLIC_SITE_URL=$FALLBACK_URL" >> "$GITHUB_ENV"
              rm -f static/CNAME

              curl -sS -X PATCH \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                "https://api.github.com/repos/$GH_REPO/pages" \
                -d '{"cname":null}' > /tmp/pages-domain-apply.json
            fi
          else
            echo "DOMAIN_ACTIVE=false" >> "$GITHUB_ENV"
            echo "PUBLIC_SITE_URL=$FALLBACK_URL" >> "$GITHUB_ENV"
            rm -f static/CNAME
          fi

      - name: Build site
        env:
          PUBLIC_GHL_FORM_ENDPOINT: ${{ secrets.PUBLIC_GHL_FORM_ENDPOINT }}
          NODE_ENV: production
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_PAGES: true
          PUBLIC_SITE_URL: ${{ env.PUBLIC_SITE_URL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report deploy domain routing
        env:
          DOMAIN: diabloautodetailing.com
        run: |
          if [ "${DOMAIN_ACTIVE}" = "true" ]; then
            if command -v curl >/dev/null 2>&1; then
              status="$(curl -L --max-time 12 -o /tmp/domain.html -s -w '%{http_code}' "https://$DOMAIN/" || true)"
              if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
                echo "https://$DOMAIN responds with HTTP $status"
              else
                echo "::warning::Domain routing check failed for https://$DOMAIN (status: ${status})."
              fi
            fi
          else
            echo "::notice::DNS for $DOMAIN not detected in this deploy; using ${{ env.PUBLIC_SITE_URL }} fallback."
          fi
